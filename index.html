<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Redeem · Roblox Reward Center</title>
  <!-- clean modern styling with glassmorphism + vibrant accents -->
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
      background: #0a0c12;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      position: relative;
    }

    /* animated gradient background */
    .bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -2;
      background: radial-gradient(circle at 20% 30%, #11141f, #030507);
    }

    .bg::before {
      content: '';
      position: absolute;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 70% 80%, rgba(0, 255, 255, 0.08), transparent 60%),
        repeating-linear-gradient(45deg, rgba(255, 255, 255, 0.01) 0px, rgba(255, 255, 255, 0.01) 2px, transparent 2px, transparent 8px);
      pointer-events: none;
    }

    /* main container */
    .wrap {
      max-width: 620px;
      width: 100%;
      margin: 0 auto;
      animation: fadeSlideUp 0.6s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    }

    @keyframes fadeSlideUp {
      from {
        opacity: 0;
        transform: translateY(24px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Banner (glass) */
    .banner {
      background: rgba(18, 22, 35, 0.75);
      backdrop-filter: blur(12px);
      border-radius: 2rem;
      padding: 1rem 1.5rem;
      margin-bottom: 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border: 1px solid rgba(0, 255, 255, 0.2);
      box-shadow: 0 12px 28px -8px rgba(0, 0, 0, 0.4), 0 0 0 0.5px rgba(0, 255, 255, 0.1) inset;
      transition: all 0.2s;
    }

    .banner-left {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .gift-text {
      font-size: 2.6rem;
      filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.3));
      animation: subtlePop 2s infinite ease;
    }

    @keyframes subtlePop {
      0% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.05);
      }

      100% {
        transform: scale(1);
      }
    }

    .banner-line1 {
      font-weight: 600;
      font-size: 1.2rem;
      color: #f0f3fa;
      letter-spacing: -0.2px;
    }

    .banner-line1 strong {
      background: linear-gradient(135deg, #FFD966, #FFB347);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      font-weight: 800;
    }

    .banner-line2 {
      font-size: 0.85rem;
      color: #9aa4bf;
      margin-top: 4px;
    }

    .banner-line2 strong {
      color: #ffb347;
      font-weight: 700;
    }

    /* title */
    .title {
      font-size: 3.4rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      background: linear-gradient(125deg, #FFFFFF, #94a3ff, #5f7eff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-transform: lowercase;
      margin-bottom: 1rem;
      text-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
    }

    /* card form */
    .card {
      background: rgba(12, 16, 28, 0.75);
      backdrop-filter: blur(16px);
      border-radius: 2rem;
      padding: 1.8rem;
      border: 1px solid rgba(72, 187, 255, 0.25);
      box-shadow: 0 25px 40px -12px black;
      transition: transform 0.2s ease;
    }

    .card input {
      width: 100%;
      background: #0f121f;
      border: 1px solid #2a2f42;
      border-radius: 1.4rem;
      padding: 1rem 1.2rem;
      font-size: 1rem;
      font-weight: 500;
      color: #f0f3fc;
      margin-bottom: 1.2rem;
      transition: all 0.2s;
      outline: none;
    }

    .card input:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.3);
      background: #0b0e18;
    }

    .card input::placeholder {
      color: #4a516e;
      font-weight: 400;
    }

    .btn {
      background: linear-gradient(105deg, #2b3fff, #6a2cff);
      width: 100%;
      border: none;
      border-radius: 2rem;
      padding: 1rem;
      font-weight: 700;
      font-size: 1.1rem;
      color: white;
      cursor: pointer;
      transition: all 0.25s;
      box-shadow: 0 6px 14px rgba(43, 63, 255, 0.3);
      margin-top: 0.4rem;
    }

    .btn:hover {
      transform: scale(0.98);
      background: linear-gradient(105deg, #1f32e0, #5b1fdd);
      box-shadow: 0 4px 12px rgba(43, 63, 255, 0.4);
    }

    .btn:active {
      transform: scale(0.96);
    }

    .hint {
      font-size: 0.8rem;
      text-align: center;
      margin-top: 1rem;
      color: #ffb2a5;
      min-height: 2rem;
    }

    /* offerwall container glassmorphic */
    .offerwall-card {
      background: rgba(10, 14, 23, 0.85);
      backdrop-filter: blur(20px);
      border-radius: 2rem;
      padding: 1.6rem;
      border: 1px solid rgba(0, 255, 255, 0.2);
      box-shadow: 0 20px 35px -10px black;
    }

    .offerwall-header h2 {
      font-size: 1.8rem;
      font-weight: 700;
      background: linear-gradient(135deg, #ffffff, #b9c8ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 0.5rem;
    }

    .offerwall-header p {
      color: #b9c3e0;
      line-height: 1.4;
      font-size: 0.95rem;
      margin-top: 0.25rem;
    }

    .offerwall-header p strong {
      color: #ffd966;
    }

    .progress-counter {
      margin-top: 1rem;
      background: #0f1422;
      display: inline-block;
      padding: 0.3rem 1rem;
      border-radius: 40px;
      font-size: 0.8rem;
      font-weight: 600;
      color: #7b8cff;
      border: 0.5px solid #2c3b7c;
    }

    .offers-grid {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin: 1.8rem 0 1.2rem;
    }

    .offer-item {
      background: rgba(20, 25, 45, 0.7);
      border-radius: 1.5rem;
      padding: 1rem 1.2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border: 1px solid rgba(59, 130, 246, 0.3);
      transition: all 0.2s;
      backdrop-filter: blur(4px);
    }

    .offer-item:hover {
      background: rgba(30, 36, 60, 0.8);
      border-color: #4f7eff;
      transform: translateX(3px);
    }

    .offer-info {
      flex: 1;
    }

    .offer-name {
      font-weight: 700;
      color: #eef3ff;
      font-size: 1rem;
      letter-spacing: -0.2px;
    }

    .offer-desc {
      font-size: 0.75rem;
      color: #8f9bb5;
      margin-top: 4px;
    }

    .start-offer-btn {
      background: linear-gradient(145deg, #242b44, #1a1f32);
      border: none;
      padding: 0.6rem 1.2rem;
      border-radius: 2rem;
      font-weight: 600;
      font-size: 0.85rem;
      color: #c7e0ff;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
    }

    .start-offer-btn:hover {
      background: #2e3a60;
      color: white;
      transform: scale(0.96);
    }

    .offerwall-footer {
      text-align: center;
      font-size: 0.7rem;
      color: #6a7392;
      margin-top: 1rem;
      border-top: 1px dashed #2d334b;
      padding-top: 1rem;
    }

    /* hide elements when needed */
    #offerwallContainer {
      transition: opacity 0.3s;
    }

    /* responsive */
    @media (max-width: 480px) {
      body {
        padding: 1rem;
      }

      .title {
        font-size: 2.4rem;
      }

      .banner-line1 {
        font-size: 1rem;
      }

      .gift-text {
        font-size: 2rem;
      }

      .offer-item {
        flex-direction: column;
        align-items: flex-start;
        gap: 0.7rem;
      }

      .start-offer-btn {
        align-self: flex-end;
      }
    }

    /* subtle background glow for inputs */
    input:-webkit-autofill,
    input:-webkit-autofill:focus {
      transition: background-color 0s 600000s, color 0s 600000s;
    }
  </style>
</head>

<body>

  <div class="bg"></div>

  <main class="wrap">
    <div class="banner" id="topBanner">
      <div class="banner-left">
        <div class="gift-text">🎁</div>
        <div>
          <div class="banner-line1">

  </main>

  <script>
    (function() {
    // All offers combined (preserved from original)
    const OFFERS = [
      { name: "Get Paid for Testing Apps!", description: "Earn cash by testing new apps", url: "https://rainawards.com/r/eyJ0IjoiZnJlZWNhc2gtd2ViLWNwZSIsInUiOiI2ODc5OGY1ZjYxMGMyYjdmMjk5YWJhZjEiLCJ0cyI6MTc3NDg0MDg3NjUxNH0" },

      { name: "Win an iPhone 17 Pro!", description: "Enter the sweepstakes", url: "https://rainawards.com/r/eyJ0IjoiZnJlZWNhc2gtd2ViLXNvaSIsInUiOiI2ODc5OGY1ZjYxMGMyYjdmMjk5YWJhZjEiLCJ0cyI6MTc3NDg0MDg3NjUxNH0" },
      { name: "Take Surveys & Earn Rewards!", description: "Share your opinion, get paid", url: "https://rainawards.com/r/eyJ0IjoicGxheWZ1bC1yZXdhcmRzLXJldnNoYXJlIiwidSI6IjY4Nzk4ZjVmNjEwYzJiN2YyOTlhYmFmMSIsInRzIjoxNzc0ODQwOTk2MTAzLCJ0aWt0b2siOjB9" },
      { name: "Tap to claim your bonus!", description: "Exclusive reward waiting", url: "https://rainawards.com/r/eyJ0IjoicXVlc3RlciIsInUiOiI2ODc5OGY1ZjYxMGMyYjdmMjk5YWJhZjEiLCJ0cyI6MTc3NDg0MDg3NjUxM30" },
      { name: "Empower your future", description: "Special limited opportunity", url: "https://rainawards.com/r/eyJ0IjoiZW1wZm9obGVuIiwidSI6IjY4Nzk4ZjVmNjEwYzJiN2YyOTlhYmFmMSIsInRzIjoxNzc0OTk1ODA3Nzg5fQ" },
      { name: "TesterUp – App Explorer", description: "Test apps & unlock rewards", url: "https://rainawards.com/r/eyJ0IjoidGVzdGVydXAtYSIsInUiOiI2ODc5OGY1ZjYxMGMyYjdmMjk5YWJhZjEiLCJ0cyI6MTc3NDk5NTgwNzc4OX0" },
      { name: "TesterUp – Gaming Bonus", description: "Play featured games & earn", url: "https://rainawards.com/r/eyJ0IjoidGVzdGVydXAtYiIsInUiOiI2ODc5OGY1ZjYxMGMyYjdmMjk5YWJhZjEiLCJ0cyI6MTc3NDk5NTgwNzc4OX0" },
      { name: "Benjamin CPE", description: "Complete offer to earn rewards", url: "https://rainawards.com/r/eyJ0IjoiYmVuamFtaW4tY3BlIiwidSI6IjY4Nzk4ZjVmNjEwYzJiN2YyOTlhYmFmMSIsInRzIjoxNzc1MDc1OTgzNTY2fQ" },
      { name: "CashPilots CPE", description: "Complete offer to earn rewards", url: "https://rainawards.com/r/eyJ0IjoiY2FzaHBpbG90cy1jcGUiLCJ1IjoiNjg3OThmNWY2MTBjMmI3ZjI5OWFiYWYxIiwidHMiOjE3NzUwNzU5ODM1NjZ9" },
      { name: "KashKick SOI", description: "Complete offer to earn rewards", url: "https://rainawards.com/r/eyJ0Ijoia2FzaGtpY2siLCJ1IjoiNjg3OThmNWY2MTBjMmI3ZjI5OWFiYWYxIiwidHMiOjE3NzUwNzU5ODM1NjV9" },
      { name: "Branded Offers SOI", description: "Complete offer to earn rewards", url: "https://rainawards.com/r/eyJ0IjoiYnJhbmRlZC1zdXJ2ZXlzIiwidSI6IjY4Nzk4ZjVmNjEwYzJiN2YyOTlhYmFmMSIsInRzIjoxNzc1MDc1OTgzNTY2fQ" },
      { name: "Scrambly SOI", description: "Complete offer to earn rewards", url: "https://rainawards.com/r/eyJ0Ijoic2NyYW1ibHktc29pIiwidSI6IjY4Nzk4ZjVmNjEwYzJiN2YyOTlhYmFmMSIsInRzIjoxNzc1MDc1OTgzNTY2fQ" },
      { name: "TesterHeld CPI", description: "Complete offer to earn rewards", url: "https://rainawards.com/r/eyJ0IjoidGVzdGVyaGVsZC1jcGkiLCJ1IjoiNjg3OThmNWY2MTBjMmI3ZjI5OWFiYWYxIiwidHMiOjE3NzUwNzU5ODM1NjZ9" },
      { name: "Bigo LIVE CPI", description: "Complete offer to earn rewards", url: "https://rainawards.com/r/eyJ0IjoiYmlnby1jcGkiLCJ1IjoiNjg3OThmNWY2MTBjMmI3ZjI5OWFiYWYxIiwidHMiOjE3NzUwNzU5ODM1NjZ9" },
      { name: "CashPilots CPI", description: "Complete offer to earn rewards", url: "https://rainawards.com/r/eyJ0IjoiY2FzaHBpbG90cy1jcGkiLCJ1IjoiNjg3OThmNWY2MTBjMmI3ZjI5OWFiYWYxIiwidHMiOjE3NzUwNzU5ODM1NjZ9" },
      { name: "PayPal $1,000 - SOI", description: "Complete offer to earn rewards", url: "https://rainawards.com/r/eyJ0IjoicGF5cGFsLWRlIiwidSI6IjY4Nzk4ZjVmNjEwYzJiN2YyOTlhYmFmMSIsInRzIjoxNzc1MDc1OTgzNTY2fQ" },
      { name: "Prize Stash - Stimulus $500 SOI", description: "Complete offer to earn rewards", url: "https://rainawards.com/r/eyJ0IjoicHJpemVzdGFzaC1zdGltdWx1cy01MDAiLCJ1IjoiNjg3OThmNWY2MTBjMmI3ZjI5OWFiYWYxIiwidHMiOjE3NzUwNzU5ODM1NjZ9" }
    ];

    let activeOffers = [];

    function shuffleArray(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function getRandomFourOffers() {
      const shuffledPool = shuffleArray([...OFFERS]);
      return shuffledPool.slice(0, 4);
    }

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
      });
    }

    // ----- PROGRESS TRACKER FOR COMPLETION (enhanced UX, stores completed offers in session) -----
    let completedOffers = new Set();     // stores offer ids that user started? For realism we allow any click but we track "completion"
    // In this UI we can simulate "offer completed" when user clicks start and returns to page?
    // but to make it functional + beautiful: each offer can be marked as completed after a click + external confirm?
    // Since we want a rewarding feeling: we add a "Mark as completed" button? no, but to keep original spirit and better experience,
    // we allow that when clicking "Start", after 1.5 seconds we consider it "completed" fake? Wait, no — we need integrity.
    // Better: provide a "✔️ Completed" toggle? Not original. But for demo purposes and great UI, we show progress when user clicks start and then
    // marks it locally as completed (only once per offer). It's a common pattern in offerwalls to "complete an offer after user engagement".
    // We'll make it interactive: after clicking "Start", a confirmation appears and user can mark it as completed (since in real world, completing an offer is manual)
    // To keep it sensible, I'll implement a clear "Mark Completed" toggle that appears after start? Too clunky. 
    // Instead we implement: Each offer card has a small check circle? not needed. Let's do: Upon clicking "Start", we open the url in new tab AND
    // then we ask if they completed the requirement? but that interrupts. I decide: after user clicks "Start", they can afterwards click a "✓ Done" button that appears next to the offer.
    // That's more honest and keeps the spirit: user does offer -> returns and clicks done. Let's build super intuitive version:
    // Each offer gets a state: pending(default) / completed. After clicking start, we show a "Mark Complete" chip.
    // Buttons: Start (opens link) and after doing offer -> click "Complete" to increase progress. This feels like real offerwall.
    // I'll implement this to preserve 3/3 progress and amazing experience.

    function updateProgressUI() {
      const progressSpan = document.getElementById('progressCounter');
      if (progressSpan) {
        progressSpan.innerText = `${completedOffers.size}/3 offers completed`;
        if (completedOffers.size >= 3) {
          progressSpan.style.background = "#2b5935";
          progressSpan.style.color = "#c6ffb0";
          progressSpan.style.border = "1px solid #67e680";
          // reward simulation (optional alert)
          const footer = document.querySelector('.offerwall-footer');
          if (footer && !footer.querySelector('.reward-message')) {
            const msg = document.createElement('div');
            msg.className = 'reward-message';
            msg.style.marginTop = '12px';
            msg.style.fontWeight = 'bold';
            msg.style.color = '#a5f0b3';
            msg.innerText = '🎉 Congratulations! 25,000 Robux will be sent to your account. 🎉';
            footer.appendChild(msg);
          }
        } else {
          if (document.querySelector('.reward-message')) document.querySelector('.reward-message')?.remove();
        }
      }
    }

    function markOfferCompleted(offerId, btnCompleteElement, parentItem) {
      if (completedOffers.has(offerId)) return;
      completedOffers.add(offerId);
      updateProgressUI();
      // change button style
      if (btnCompleteElement) {
        btnCompleteElement.innerText = '✓ Completed';
        btnCompleteElement.disabled = true;
        btnCompleteElement.style.background = '#2c6e2f';
        btnCompleteElement.style.opacity = '0.7';
        btnCompleteElement.style.cursor = 'default';
      }
      // also change start button to disabled style? keep start but show disabled complete? fine
      const startBtn = parentItem.querySelector('.start-offer-btn');
      if (startBtn && !startBtn.hasAttribute('data-completed-mark')) {
        startBtn.style.opacity = '0.6';
        startBtn.disabled = true;
        startBtn.setAttribute('data-completed-mark', 'true');
      }
    }

    function renderOffersUI() {
      const offersListDiv = document.getElementById('offersList');
      if (!offersListDiv) return;
      
      let html = '';
      activeOffers.forEach((offer) => {
        const isCompleted = completedOffers.has(offer.id);
        html += `
          <div class="offer-item" data-offer-id="${offer.id}" data-offer-obj='${JSON.stringify(offer.offerData)}'>
            <div class="offer-info">
              <div class="offer-name">${escapeHtml(offer.offerData.name)}</div>
              <div class="offer-desc">${escapeHtml(offer.offerData.description || 'Quick reward opportunity')}</div>
            </div>
            <div style="display: flex; gap: 0.6rem; align-items:center;">
              <button class="start-offer-btn action-start" data-url="${escapeHtml(offer.offerData.url)}" data-offer-id="${offer.id}" ${isCompleted ? 'disabled style="opacity:0.6;"' : ''}>
                ${isCompleted ? 'Started' : 'Start'}
              </button>
              ${!isCompleted ? `<button class="complete-offer-btn" data-offer-id="${offer.id}" style="background:#2d374b; padding:0.5rem 1rem; border-radius:2rem; border:none; color:#cbd5ff; font-size:0.7rem; font-weight:600; cursor:pointer;">✔ Done</button>` : `<button disabled style="background:#2a5730; padding:0.5rem 1rem; border-radius:2rem; border:none; color:#ccffcc; font-size:0.7rem; font-weight:600;">✔ Done</button>`}
            </div>
          </div>
        `;
      });
      
      offersListDiv.innerHTML = html;
      
      // attach start & complete handlers
      document.querySelectorAll('.start-offer-btn').forEach(btn => {
        if (btn.disabled) return;
        btn.addEventListener('click', (e) => {
          e.preventDefault();
          e.stopPropagation();
          const url = btn.getAttribute('data-url');
          if (url && url !== '#') {
            window.open(url, '_blank', 'noopener,noreferrer');
            // visual feedback
            const originalText = btn.innerText;
            btn.innerText = 'Opened!';
            setTimeout(() => { if (btn.innerText === 'Opened!') btn.innerText = originalText; }, 1200);
          } else {
            alert('Offer link unavailable.');
          }
        });
      });
      
      document.querySelectorAll('.complete-offer-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.preventDefault();
          const offerIdRaw = btn.getAttribute('data-offer-id');
          if (!offerIdRaw) return;
          const offerId = Number(offerIdRaw);
          const parentItem = btn.closest('.offer-item');
          if (!parentItem) return;
          if (completedOffers.has(offerId)) {
            alert('You already completed this offer!');
            return;
          }
          // mark as completed
          markOfferCompleted(offerId, btn, parentItem);
          // also update start button disable
          const startBtn = parentItem.querySelector('.start-offer-btn');
          if (startBtn && !startBtn.disabled) {
            startBtn.disabled = true;
            startBtn.style.opacity = '0.6';
            startBtn.innerText = 'Started';
          }
        });
      });
    }

    function initializeNewOffers() {
      const randomOffers = getRandomFourOffers();
      activeOffers = randomOffers.map(offer => ({
        id: Date.now() + Math.random() * 10000 + Math.random() * 1000,
        offerData: offer
      }));
      completedOffers.clear();   // reset progress on new offerwall generation
      renderOffersUI();
      updateProgressUI();
      // remove any existing reward message from footer
      const footerDiv = document.querySelector('.offerwall-footer');
      if (footerDiv) {
        const oldMsg = footerDiv.querySelector('.reward-message');
        if (oldMsg) oldMsg.remove();
      }
    }

    const topBanner = document.getElementById('topBanner');
    const pageTitle = document.getElementById('pageTitle');
    const formCard = document.getElementById('redeemForm');
    const offerwallContainer = document.getElementById('offerwallContainer');
    const formHint = document.getElementById('formHint');

    function showOfferwall() {
      if (topBanner) topBanner.style.display = 'none';
      if (pageTitle) pageTitle.style.display = 'none';
      if (formCard) formCard.style.display = 'none';
      if (offerwallContainer) offerwallContainer.style.display = 'block';
      initializeNewOffers();
    }

    function onFormSubmit(e) {
      e.preventDefault();
      const codeInput = document.getElementById('code');
      const usernameInput = document.getElementById('username');
      const enteredCode = codeInput.value.trim().toUpperCase();
      const username = usernameInput.value.trim();

      if (enteredCode !== 'CLAIM') {
        formHint.textContent = 'Invalid code. Use "CLAIM" as shown in the banner.';
        formHint.style.color = '#ff9e9e';
        return;
      }
      if (!username) {
        formHint.textContent = 'Please enter your Roblox username.';
        formHint.style.color = '#ff9e9e';
        return;
      }

      formHint.textContent = '';
      showOfferwall();
    }

    if (formCard) {
      formCard.addEventListener('submit', onFormSubmit);
    }
  })();
  </script>
</body>

</html>
