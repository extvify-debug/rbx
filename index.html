<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redeem - Offerwall</title>
  <link rel="stylesheet" href="./Redeem_files/style.css">
</head>
<body>

<div class="bg"></div>

<main class="wrap">
  <div class="banner">
    <div class="banner-left">
      <div class="gift">🎁</div>
      <div>
        <div class="banner-line1">
          25,000 Robux Code: <strong>CLAIM</strong>
        </div>
        <div class="banner-line2">
          Only <strong>27</strong> codes remaining.
        </div>
      </div>
    </div>
  </div>

  <h1 class="title">redeem</h1>

  <!-- Form Card (hidden after valid code+username) -->
  <form class="card" id="redeemForm">
    <input id="code" type="text" placeholder="Code" value="CLAIM">
    <input id="username" type="text" placeholder="Roblox Username">
    <button class="btn" type="submit" id="redeemBtn">
      Redeem
    </button>
    <p class="hint" id="formHint"></p>
  </form>

  <!-- Offerwall Card (initially hidden) -->
  <div id="offerwallContainer" style="display: none;">
    <div class="card" style="padding: 1rem 1rem 1.5rem;">
      <div style="text-align: center; margin-bottom: 1rem;">
        <h2 style="font-size: 1.4rem; color: #f5b042;">✨ You're Almost Done!</h2>
        <p style="color: #ccc; margin: 0.3rem 0;">Your code is valid! Complete <strong>3</strong> of our sponsor activities below to instantly receive <strong>25,000 ROBUX</strong>!</p>
        <div id="progressCounter" style="margin: 0.8rem 0; font-weight: bold; font-size: 1.2rem; color: #f5b042;">0/3 offers completed</div>
      </div>
      <div id="offersList" style="display: flex; flex-direction: column; gap: 0.8rem;"></div>
      <div id="rewardArea" style="margin-top: 1.5rem; text-align: center;"></div>
    </div>
  </div>

  <div class="icons">
    <a class="icon" href="#">
      <svg viewBox="0 0 24 24">
        <g transform="rotate(-15 12 12)">
          <rect x="4" y="4" width="16" height="16" fill="white"></rect>
          <rect x="9" y="9" width="6" height="6" fill="#0a0a14"></rect>
        </g>
      </svg>
    </a>
    <a class="icon" href="#">
      <svg viewBox="0 0 24 24">
        <path fill="white" d="M20.3 4.6A17.4 17.4 0 0 0 16.7 3l-.2.4c1.3.3 2.6.8 3.8 1.5A14.6 14.6 0 0 0 3.7 4.9c1.2-.7 2.5-1.2 3.8-1.5L7.3 3a17.4 17.4 0 0 0-3.6 1.6C1.7 7.7 1.3 10.7 1.5 13.6A17.6 17.6 0 0 0 6.3 21l1-1.3c-.6-.3-1.1-.6-1.6-.9l.4-.3c3.1 1.5 6.5 1.5 9.6 0l.4.3c-.5.3-1 .6-1.6.9l1 1.3a17.6 17.6 0 0 0 4.8-7.4c.3-2.9-.1-5.9-2-9Zm-11.6 9c-.9 0-1.6-.8-1.6-1.8s.7-1.8 1.6-1.8 1.6.8 1.6 1.8-.7 1.8-1.6 1.8Zm6.6 0c-.9 0-1.6-.8-1.6-1.8s.7-1.8 1.6-1.8 1.6.8 1.6 1.8-.7 1.8-1.6 1.8Z"></path>
      </svg>
    </a>
    <a class="icon" href="#">
      <svg viewBox="0 0 24 24">
        <path fill="white" d="M18.2 2h3.1l-6.8 7.8L23 22h-6.3l-4.9-6.6L6.2 22H3l7.5-8.5L1 2h6.4l4.4 5.9L18.2 2Zm-1.1 18h1.7L7.4 3.9H5.7L17.1 20Z"></path>
      </svg>
    </a>
  </div>
</main>

<script>
  (function() {
    // --- OFFERS (exactly as shown in your screenshot, no coin values) ---
    const OFFERS = [
      { name: "Quick install: Opera GX", description: "Download + install", url: "https://rainawards.com/r/eyJ0IjoiZnJlZWNhc2gtd2ViLWNwZSIsInUiOiI2ODc5OGY1ZjYxMGMyYjdmMjk5YWJhZjEiLCJ0cyI6MTc3NDg0MDg3NjUxNH0" },
      { name: "Complete the survey and earn the best rewards", description: "Complete the survey", url: "https://rainawards.com/r/eyJ0IjoiZnJlZWNhc2gtY3BpIiwidSI6IjY4Nzk4ZjVmNjEwYzJiN2YyOTlhYmFmMSIsInRzIjoxNzc0ODQwODc2NTEzfQ" },
      { name: "Win an iPhone 17 Pro!", description: "Complete with valid information", url: "https://rainawards.com/r/eyJ0IjoiZnJlZWNhc2gtd2ViLXNvaSIsInUiOiI2ODc5OGY1ZjYxMGMyYjdmMjk5YWJhZjEiLCJ0cyI6MTc3NDg0MDg3NjUxNH0" },
      { name: "Try your luck and find your treasure!", description: "Complete the survey", url: "https://rainawards.com/r/eyJ0IjoicGxheWZ1bC1yZXdhcmRzLXJldnNoYXJlIiwidSI6IjY4Nzk4ZjVmNjEwYzJiN2YyOTlhYmFmMSIsInRzIjoxNzc0ODQwOTk2MTAzLCJ0aWt0b2siOjB9" },
      { name: "Tap to claim your bonus!", description: "Complete with valid information", url: "https://rainawards.com/r/eyJ0IjoicXVlc3RlciIsInUiOiI2ODc5OGY1ZjYxMGMyYjdmMjk5YWJhZjEiLCJ0cyI6MTc3NDg0MDg3NjUxM30" }
    ];

    // DOM elements
    const formCard = document.getElementById('redeemForm');
    const offerwallContainer = document.getElementById('offerwallContainer');
    const offersListDiv = document.getElementById('offersList');
    const progressCounterSpan = document.getElementById('progressCounter');
    const rewardArea = document.getElementById('rewardArea');
    const formHint = document.getElementById('formHint');

    let completedOffers = new Set(); // track which offers are done (by index)
    let rewardRevealed = false;

    function updateProgress() {
      const completedCount = completedOffers.size;
      progressCounterSpan.innerText = `${completedCount}/3 offers completed`;
      if (completedCount >= 3 && !rewardRevealed) {
        revealReward();
      }
    }

    function revealReward() {
      rewardRevealed = true;
      const username = document.getElementById('username').value.trim();
      const code = document.getElementById('code').value.trim() || 'CLAIM';
      rewardArea.innerHTML = `
        <div style="background: #1e2a2a; border-radius: 1rem; padding: 1rem; border: 1px solid #f5b042;">
          <h3 style="color: #f5b042; margin-bottom: 0.5rem;">🎉 25,000 ROBUX UNLOCKED! 🎉</h3>
          <p style="color: white;">Your code: <strong style="font-size: 1.2rem;">${escapeHtml(code)}</strong></p>
          <p style="color: #aaa;">Redeem at roblox.com/redeem for <strong>${escapeHtml(username)}</strong></p>
          <p style="font-size: 0.8rem; margin-top: 0.8rem;">✅ You've completed 3 offers. Enjoy your Robux!</p>
        </div>
      `;
      // Disable all "Start" buttons after reward is revealed
      document.querySelectorAll('.start-offer-btn').forEach(btn => {
        btn.disabled = true;
        btn.textContent = 'Completed';
      });
    }

    function completeOffer(index) {
      if (completedOffers.has(index)) return;
      completedOffers.add(index);
      const btn = document.getElementById(`offer-btn-${index}`);
      if (btn) {
        btn.textContent = '✓ Done';
        btn.disabled = true;
      }
      updateProgress();
    }

    function renderOffers() {
      let html = '';
      OFFERS.forEach((offer, idx) => {
        const isCompleted = completedOffers.has(idx);
        const btnText = isCompleted ? '✓ Done' : 'Start';
        html += `
          <div style="background: rgba(15,15,25,0.8); border-radius: 1rem; padding: 0.8rem 1rem; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.1);">
            <div style="flex: 1;">
              <div style="font-weight: 600; color: #fff;">${escapeHtml(offer.name)}</div>
              <div style="font-size: 0.75rem; color: #aaa;">${escapeHtml(offer.description)}</div>
            </div>
            <button class="start-offer-btn" id="offer-btn-${idx}" data-url="${escapeHtml(offer.url)}" data-index="${idx}" ${isCompleted ? 'disabled' : ''} style="background: #f5b042; border: none; padding: 0.4rem 1rem; border-radius: 2rem; font-weight: bold; cursor: pointer; color: #0a0a14;">${btnText}</button>
          </div>
        `;
      });
      offersListDiv.innerHTML = html;

      // Attach click listeners to Start buttons
      document.querySelectorAll('.start-offer-btn').forEach(btn => {
        if (btn.disabled) return;
        btn.addEventListener('click', (e) => {
          e.preventDefault();
          const url = btn.getAttribute('data-url');
          const index = parseInt(btn.getAttribute('data-index'), 10);
          if (url && url !== '#') {
            window.open(url, '_blank');
            completeOffer(index);
          } else {
            alert('Invalid offer link. Please try another one.');
          }
        });
      });
    }

    function resetOfferwall() {
      completedOffers.clear();
      rewardRevealed = false;
      rewardArea.innerHTML = '';
      progressCounterSpan.innerText = '0/3 offers completed';
      renderOffers();
    }

    // Form submission handler
    function onFormSubmit(e) {
      e.preventDefault();
      const codeInput = document.getElementById('code');
      const usernameInput = document.getElementById('username');
      const enteredCode = codeInput.value.trim().toUpperCase();
      const username = usernameInput.value.trim();

      if (enteredCode !== 'CLAIM') {
        formHint.textContent = '❌ Invalid code. Use "CLAIM" as shown in the banner.';
        formHint.style.color = '#ff9e9e';
        return;
      }
      if (!username) {
        formHint.textContent = '⚠️ Please enter your Roblox username.';
        formHint.style.color = '#ff9e9e';
        return;
      }

      // Valid submission: hide form, show offerwall
      formCard.style.display = 'none';
      offerwallContainer.style.display = 'block';
      resetOfferwall();
    }

    // Attach event listener
    formCard.addEventListener('submit', onFormSubmit);
  })();
</script>
</body>
</html>
