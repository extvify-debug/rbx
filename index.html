<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redeem</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Compact offerwall styles - matching robux.media aesthetic */
    .offerwall-card {
      background: #0a0a14;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 1rem;
      width: 480px;
    }

    .offerwall-header {
      text-align: center;
      margin-bottom: 0.75rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .offerwall-header h2 {
      font-size: 1.1rem;
      font-weight: 600;
      margin: 0 0 0.2rem 0;
      color: #f5b042;
    }

    .offerwall-header p {
      color: #888;
      font-size: 0.7rem;
      margin: 0;
    }

    .progress-counter {
      margin: 0.5rem 0 0 0;
      font-weight: 500;
      font-size: 0.75rem;
      color: #f5b042;
      background: rgba(245, 176, 66, 0.1);
      display: inline-block;
      padding: 0.15rem 0.6rem;
      border-radius: 12px;
    }

    .offers-grid {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      margin: 0.5rem 0;
    }

    .offer-item {
      background: rgba(15, 15, 25, 0.6);
      border-radius: 6px;
      padding: 0.5rem 0.75rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border: 1px solid rgba(255, 255, 255, 0.06);
      transition: all 0.15s;
    }

    .offer-item:hover {
      border-color: rgba(245, 176, 66, 0.3);
      background: rgba(20, 20, 35, 0.8);
    }

    .offer-info {
      flex: 1;
    }

    .offer-name {
      font-weight: 500;
      color: #fff;
      font-size: 0.8rem;
      letter-spacing: -0.2px;
    }

    .offer-desc {
      font-size: 0.65rem;
      color: #666;
      margin-top: 1px;
    }

    .start-offer-btn {
      background: rgba(245, 176, 66, 0.9);
      border: none;
      padding: 0.25rem 0.7rem;
      border-radius: 4px;
      font-weight: 500;
      font-size: 0.7rem;
      cursor: pointer;
      color: #0a0a14;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .start-offer-btn:hover {
      background: #f5b042;
      transform: scale(0.98);
    }

    .offerwall-footer {
      font-size: 0.6rem;
      text-align: center;
      margin-top: 0.6rem;
      padding-top: 0.4rem;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      color: #555;
    }

    /* Make banner more compact like target site */
    .banner {
      background: linear-gradient(#0f6b3a, #0c5a31);
      padding: 10px 16px;
      border-radius: 8px;
      width: 480px;
    }

    .banner-line1 {
      font-size: 0.9rem;
    }

    .banner-line2 {
      font-size: 0.7rem;
    }

    .title {
      font-size: 48px;
      margin: 5px 0;
    }

    .card {
      width: 480px;
      gap: 10px;
    }

    input {
      height: 48px;
      font-size: 16px;
    }

    .btn {
      height: 48px;
      font-size: 16px;
    }
  </style>
</head>
<body>

<div class="bg"></div>

<main class="wrap">
  <div class="banner" id="topBanner">
    <div class="banner-left">
      <div class="gift-text">◆</div>
      <div>
        <div class="banner-line1">
          25,000 Robux Code: <strong>CLAIM</strong>
        </div>
        <div class="banner-line2">
          Only <strong>27</strong> codes remaining.
        </div>
      </div>
    </div>
  </div>

  <h1 class="title" id="pageTitle">redeem</h1>

  <form class="card" id="redeemForm">
    <input id="code" type="text" placeholder="Code" value="CLAIM">
    <input id="username" type="text" placeholder="Roblox Username">
    <button class="btn" type="submit" id="redeemBtn">Redeem</button>
    <p class="hint" id="formHint"></p>
  </form>

  <div id="offerwallContainer" style="display: none;">
    <div class="offerwall-card">
      <div class="offerwall-header">
        <h2>Complete 3 offers</h2>
        <p>to receive 25,000 ROBUX</p>
        <div class="progress-counter" id="progressCounter">0/3 completed</div>
      </div>
      <div id="offersList" class="offers-grid"></div>
      <div class="offerwall-footer">
        Click Start on any offer — reward after 3 completions
      </div>
    </div>
  </div>
</main>

<script>
  (function() {
    const ORIGINAL_OFFERS = [
      { name: "Get Paid for Testing Apps!", description: "Earn cash by testing new apps", url: "https://rainawards.com/r/eyJ0IjoiZnJlZWNhc2gtd2ViLWNwZSIsInUiOiI2ODc5OGY1ZjYxMGMyYjdmMjk5YWJhZjEiLCJ0cyI6MTc3NDg0MDg3NjUxNH0" },
      { name: "Earn by Downloading & Playing Games!", description: "Play & earn rewards instantly", url: "https://rainawards.com/r/eyJ0IjoiZnJlZWNhc2gtY3BpIiwidSI6IjY4Nzk4ZjVmNjEwYzJiN2YyOTlhYmFmMSIsInRzIjoxNzc0ODQwODc2NTEzfQ" },
      { name: "Win an iPhone 17 Pro!", description: "Enter the sweepstakes", url: "https://rainawards.com/r/eyJ0IjoiZnJlZWNhc2gtd2ViLXNvaSIsInUiOiI2ODc5OGY1ZjYxMGMyYjdmMjk5YWJhZjEiLCJ0cyI6MTc3NDg0MDg3NjUxNH0" },
      { name: "Take Surveys & Earn Rewards!", description: "Share your opinion, get paid", url: "https://rainawards.com/r/eyJ0IjoicGxheWZ1bC1yZXdhcmRzLXJldnNoYXJlIiwidSI6IjY4Nzk4ZjVmNjEwYzJiN2YyOTlhYmFmMSIsInRzIjoxNzc0ODQwOTk2MTAzLCJ0aWt0b2siOjB9" },
      { name: "Tap to claim your bonus!", description: "Exclusive reward waiting", url: "https://rainawards.com/r/eyJ0IjoicXVlc3RlciIsInUiOiI2ODc5OGY1ZjYxMGMyYjdmMjk5YWJhZjEiLCJ0cyI6MTc3NDg0MDg3NjUxM30" }
    ];

    const NEW_OFFERS = [
      { name: "Empower your future", description: "Special limited opportunity", url: "https://rainawards.com/r/eyJ0IjoiZW1wZm9obGVuIiwidSI6IjY4Nzk4ZjVmNjEwYzJiN2YyOTlhYmFmMSIsInRzIjoxNzc0OTk1ODA3Nzg5fQ" },
      { name: "TesterUp – App Explorer", description: "Test apps & unlock rewards", url: "https://rainawards.com/r/eyJ0IjoidGVzdGVydXAtYSIsInUiOiI2ODc5OGY1ZjYxMGMyYjdmMjk5YWJhZjEiLCJ0cyI6MTc3NDk5NTgwNzc4OX0" },
      { name: "TesterUp – Gaming Bonus", description: "Play featured games & earn", url: "https://rainawards.com/r/eyJ0IjoidGVzdGVydXAtYiIsInUiOiI2ODc5OGY1ZjYxMGMyYjdmMjk5YWJhZjEiLCJ0cyI6MTc3NDk5NTgwNzc4OX0" }
    ];

    const MASTER_OFFER_POOL = [...ORIGINAL_OFFERS, ...NEW_OFFERS];

    function shuffleArray(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function getRandomSixOffers() {
      const shuffledPool = shuffleArray([...MASTER_OFFER_POOL]);
      return shuffledPool.slice(0, 6);
    }

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
      });
    }

    const topBanner = document.getElementById('topBanner');
    const pageTitle = document.getElementById('pageTitle');
    const formCard = document.getElementById('redeemForm');
    const offerwallContainer = document.getElementById('offerwallContainer');
    const offersListDiv = document.getElementById('offersList');
    const formHint = document.getElementById('formHint');
    const progressCounterSpan = document.getElementById('progressCounter');

    function renderRandomOffers() {
      if (!offersListDiv) return;
      
      const selectedOffers = getRandomSixOffers();
      
      let html = '';
      selectedOffers.forEach((offer) => {
        const displayDesc = offer.description && offer.description.trim() !== "" ? offer.description : "Quick reward";
        html += `
          <div class="offer-item">
            <div class="offer-info">
              <div class="offer-name">${escapeHtml(offer.name)}</div>
              <div class="offer-desc">${escapeHtml(displayDesc)}</div>
            </div>
            <button class="start-offer-btn" data-url="${escapeHtml(offer.url)}">Start</button>
          </div>
        `;
      });
      
      offersListDiv.innerHTML = html;
      
      document.querySelectorAll('.start-offer-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.preventDefault();
          const url = btn.getAttribute('data-url');
          if (url && url !== '#') {
            window.open(url, '_blank', 'noopener,noreferrer');
          } else {
            alert('Offer link unavailable.');
          }
        });
      });
      
      if (progressCounterSpan) {
        progressCounterSpan.textContent = '0/3 completed';
      }
    }

    function showOfferwall() {
      if (topBanner) topBanner.style.display = 'none';
      if (pageTitle) pageTitle.style.display = 'none';
      if (formCard) formCard.style.display = 'none';
      if (offerwallContainer) offerwallContainer.style.display = 'block';
      renderRandomOffers();
    }

    function onFormSubmit(e) {
      e.preventDefault();
      const codeInput = document.getElementById('code');
      const usernameInput = document.getElementById('username');
      const enteredCode = codeInput.value.trim().toUpperCase();
      const username = usernameInput.value.trim();

      if (enteredCode !== 'CLAIM') {
        formHint.textContent = 'Invalid code. Use "CLAIM".';
        formHint.style.color = '#ff9e9e';
        return;
      }
      if (!username) {
        formHint.textContent = 'Enter your Roblox username.';
        formHint.style.color = '#ff9e9e';
        return;
      }

      formHint.textContent = '';
      showOfferwall();
    }

    if (formCard) {
      formCard.addEventListener('submit', onFormSubmit);
    }
  })();
</script>
</body>
</html>
