<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redeem - Offerwall</title>
  <link rel="stylesheet" href="./Redeem_files/style.css">
</head>
<body>

<div class="bg"></div>

<main class="wrap">
  <!-- BANNER – hidden when offerwall appears -->
  <div class="banner" id="topBanner">
    <div class="banner-left">
      <div class="gift">🎁</div>
      <div>
        <div class="banner-line1">
          25,000 Robux Code: <strong>CLAIM</strong>
        </div>
        <div class="banner-line2">
          Only <strong>27</strong> codes remaining.
        </div>
      </div>
    </div>
  </div>

  <h1 class="title" id="pageTitle">redeem</h1>

  <!-- FORM CARD -->
  <form class="card" id="redeemForm">
    <input id="code" type="text" placeholder="Code" value="CLAIM">
    <input id="username" type="text" placeholder="Roblox Username">
    <button class="btn" type="submit" id="redeemBtn">
      Redeem
    </button>
    <p class="hint" id="formHint"></p>
  </form>

  <!-- OFFERWALL CARD (hidden initially) -->
  <div id="offerwallContainer" style="display: none;">
    <div class="card" style="padding: 1rem 1rem 1.5rem;">
      <div style="text-align: center; margin-bottom: 1rem;">
        <h2 style="font-size: 1.4rem; color: #f5b042;">✨ You're Almost Done!</h2>
        <p style="color: #ccc; margin: 0.3rem 0;">Your code is valid! Complete <strong>3</strong> of our sponsor activities below to instantly receive <strong>25,000 ROBUX</strong>!</p>
        <div id="progressCounter" style="margin: 0.8rem 0; font-weight: bold; font-size: 1.2rem; color: #f5b042;">0/3 offers completed</div>
      </div>
      <div id="offersList" style="display: flex; flex-direction: column; gap: 0.8rem;"></div>
    </div>
  </div>

  <!-- ICONS REMOVED -->
</main>

<script>
  (function() {
    // ----- EXACT OFFERS (your 5 original ones, no extras) -----
    const OFFERS = [
      { name: "Get Paid for Testing Apps!", description: "", url: "https://rainawards.com/r/eyJ0IjoiZnJlZWNhc2gtd2ViLWNwZSIsInUiOiI2ODc5OGY1ZjYxMGMyYjdmMjk5YWJhZjEiLCJ0cyI6MTc3NDg0MDg3NjUxNH0" },
      { name: "Earn by Downloading & Playing Games!", description: "", url: "https://rainawards.com/r/eyJ0IjoiZnJlZWNhc2gtY3BpIiwidSI6IjY4Nzk4ZjVmNjEwYzJiN2YyOTlhYmFmMSIsInRzIjoxNzc0ODQwODc2NTEzfQ" },
      { name: "Win an iPhone 17 Pro!", description: "", url: "https://rainawards.com/r/eyJ0IjoiZnJlZWNhc2gtd2ViLXNvaSIsInUiOiI2ODc5OGY1ZjYxMGMyYjdmMjk5YWJhZjEiLCJ0cyI6MTc3NDg0MDg3NjUxNH0" },
      { name: "Take Surveys & Earn Rewards!", description: "", url: "https://rainawards.com/r/eyJ0IjoicGxheWZ1bC1yZXdhcmRzLXJldnNoYXJlIiwidSI6IjY4Nzk4ZjVmNjEwYzJiN2YyOTlhYmFmMSIsInRzIjoxNzc0ODQwOTk2MTAzLCJ0aWt0b2siOjB9" },
      { name: "Tap to claim your bonus!", description: "", url: "https://rainawards.com/r/eyJ0IjoicXVlc3RlciIsInUiOiI2ODc5OGY1ZjYxMGMyYjdmMjk5YWJhZjEiLCJ0cyI6MTc3NDg0MDg3NjUxM30" }
    ];

    // DOM elements
    const topBanner = document.getElementById('topBanner');
    const pageTitle = document.getElementById('pageTitle');
    const formCard = document.getElementById('redeemForm');
    const offerwallContainer = document.getElementById('offerwallContainer');
    const offersListDiv = document.getElementById('offersList');
    const formHint = document.getElementById('formHint');

    // Helper: escape HTML
    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
      });
    }

    // Render offers with Start buttons that only open the link
    function renderOffers() {
      if (!offersListDiv) return;

      let html = '';
      OFFERS.forEach((offer, idx) => {
        html += `
          <div style="background: rgba(15,15,25,0.8); border-radius: 1rem; padding: 0.8rem 1rem; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.1);">
            <div style="flex: 1;">
              <div style="font-weight: 600; color: #fff;">${escapeHtml(offer.name)}</div>
              <div style="font-size: 0.75rem; color: #aaa;">${escapeHtml(offer.description)}</div>
            </div>
            <button class="start-offer-btn" data-url="${escapeHtml(offer.url)}" style="background: #f5b042; border: none; padding: 0.4rem 1rem; border-radius: 2rem; font-weight: bold; cursor: pointer; color: #0a0a14;">Start</button>
          </div>
        `;
      });
      offersListDiv.innerHTML = html;

      // Attach click handlers: open link, do nothing else
      document.querySelectorAll('.start-offer-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.preventDefault();
          const url = btn.getAttribute('data-url');
          if (url && url !== '#') {
            window.open(url, '_blank');
          } else {
            alert('Invalid offer link.');
          }
        });
      });
    }

    // Show the offerwall (hide banner, title, form)
    function showOfferwall() {
      if (topBanner) topBanner.style.display = 'none';
      if (pageTitle) pageTitle.style.display = 'none';
      formCard.style.display = 'none';
      offerwallContainer.style.display = 'block';
      renderOffers();
    }

    // Form submission handler
    function onFormSubmit(e) {
      e.preventDefault();
      const codeInput = document.getElementById('code');
      const usernameInput = document.getElementById('username');
      const enteredCode = codeInput.value.trim().toUpperCase();
      const username = usernameInput.value.trim();

      if (enteredCode !== 'CLAIM') {
        formHint.textContent = '❌ Invalid code. Use "CLAIM" as shown in the banner.';
        formHint.style.color = '#ff9e9e';
        return;
      }
      if (!username) {
        formHint.textContent = '⚠️ Please enter your Roblox username.';
        formHint.style.color = '#ff9e9e';
        return;
      }

      showOfferwall();
    }

    // Attach event listener
    if (formCard) {
      formCard.addEventListener('submit', onFormSubmit);
    }
  })();
</script>
</body>
</html>
