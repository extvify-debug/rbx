<script>
  (function() {
    // Helper: open the offerwall safely
    function openOfferwall() {
      // Check if the global function exists (provided by Taprain)
      if (typeof window.openOfferwall_69bf833f2d6a708a36f234d5 === 'function') {
        const result = window.openOfferwall_69bf833f2d6a708a36f234d5();
        // If the function returns another function (which opens the locker), call it
        if (typeof result === 'function') {
          result();
        }
        console.log('Offerwall opened');
      } else {
        console.error('Taprain offerwall function not found. Script may have failed to load.');
        // Show a fallback message to the user
        const hint = document.getElementById('hint');
        if (hint) {
          hint.textContent = 'Failed to load offers. Please disable ad blockers and refresh.';
          hint.style.color = 'red';
        }
      }
    }

    // Wait for the page and any required scripts to be fully loaded
    function waitForScriptAndOpen() {
      // If the function is already defined, open immediately
      if (typeof window.openOfferwall_69bf833f2d6a708a36f234d5 === 'function') {
        openOfferwall();
      } else {
        // Otherwise, wait for the script to load (polling up to 5 seconds)
        let attempts = 0;
        const interval = setInterval(() => {
          if (typeof window.openOfferwall_69bf833f2d6a708a36f234d5 === 'function') {
            clearInterval(interval);
            openOfferwall();
          } else if (attempts >= 50) { // 5 seconds (50 * 100ms)
            clearInterval(interval);
            console.error('Timeout waiting for Taprain script');
            const hint = document.getElementById('hint');
            if (hint) {
              hint.textContent = 'Timeout loading offers. Check your internet connection and ad blockers.';
              hint.style.color = 'red';
            }
          }
          attempts++;
        }, 100);
      }
    }

    // Handle form submission
    const form = document.getElementById('redeemForm');
    if (form) {
      form.addEventListener('submit', function(e) {
        e.preventDefault(); // Stop the form from submitting normally
        waitForScriptAndOpen();
      });
    }
